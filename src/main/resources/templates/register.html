<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body {
font-family: Arial;
background: #121212;
color: white;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.container {
background: #1e1e1e;
padding: 30px;
border-radius: 10px;
width: 300px;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
border: none;
border-radius: 5px;
}

button {
width: 100%;
padding: 10px;
margin-top: 10px;
border: none;
border-radius: 5px;
background: #00adb5;
color: white;
cursor: pointer;
}

a {
color: #00adb5;
text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
<h2>Register</h2>

<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button type="submit">Register</button>
</form>

<p>Already have an account? <a href="/">Login</a></p>

</div>

</body>
</html>
